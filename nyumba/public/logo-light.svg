    <line x1="319" y1="74" x2="345" y2="74" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>

    <rect x="292" y="44" width="22" height="46" fill="url(#lbldg)" rx="1"/>
    <line x1="292" y1="58" x2="314" y2="58" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <line x1="292" y1="72" x2="314" y2="72" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>

