    <line x1="200" y1="16" x2="200" y2="65" stroke="rgba(0,0,0,0.08)" stroke-width="0.8"/>
    <rect x="191" y="35" width="18" height="16" fill="#EF9F27" rx="2"/>
    <line x1="200" y1="35" x2="200" y2="51" stroke="rgba(0,0,0,0.20)" stroke-width="1"/>
    <line x1="191" y1="43" x2="209" y2="43" stroke="rgba(0,0,0,0.20)" stroke-width="1"/>
    <ellipse cx="200" cy="43" rx="22" ry="15" fill="rgba(239,159,39,0.15)"/>

