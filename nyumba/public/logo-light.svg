    <text x="200" y="153" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" text-anchor="middle">
      <tspan fill="#1D9E75">Nyumba</tspan><tspan fill="#EF9F27" font-style="italic">Fasta</tspan>
    </text>

    <!-- TAGLINE -->
    <text x="200" y="174" font-family="Arial, Helvetica, sans-serif" font-size="9.5" letter-spacing="3" fill="#94A3B8" text-anchor="middle">&#x2014; HARAKA &amp; KWA UHAKIKA &#x2014;</text>

