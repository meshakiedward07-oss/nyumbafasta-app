<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 140 440 220">
  <defs>
    <linearGradient id="lgoldWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F5C842"/>
      <stop offset="50%"  stop-color="#EF9F27"/>
      <stop offset="100%" stop-color="#D4820A"/>
    </linearGradient>
    <linearGradient id="lbldg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2EBA8A"/>
      <stop offset="100%" stop-color="#1D9E75"/>
