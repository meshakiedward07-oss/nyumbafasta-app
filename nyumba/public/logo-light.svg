    <line x1="361" y1="10" x2="361" y2="90" stroke="rgba(0,0,0,0.10)" stroke-width="0.8"/>
    <line x1="350" y1="28" x2="372" y2="28" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
