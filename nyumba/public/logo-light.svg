    <line x1="28"  y1="28" x2="50"  y2="28" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <line x1="28"  y1="46" x2="50"  y2="46" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <line x1="28"  y1="64" x2="50"  y2="64" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <rect x="31" y="14" width="7"  height="5" fill="rgba(239,159,39,0.80)" rx="0.5"/>
    <rect x="42" y="14" width="7"  height="5" fill="rgba(239,159,39,0.80)" rx="0.5"/>
    <rect x="31" y="32" width="7"  height="5" fill="rgba(239,159,39,0.80)" rx="0.5"/>
    <rect x="42" y="32" width="7"  height="5" fill="rgba(239,159,39,0.80)" rx="0.5"/>

    <rect x="55"  y="26" width="26" height="64" fill="url(#lbldg)" rx="1"/>
    <line x1="55"  y1="42" x2="81"  y2="42" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <line x1="55"  y1="58" x2="81"  y2="58" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <line x1="55"  y1="74" x2="81"  y2="74" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>

    <rect x="86"  y="44" width="22" height="46" fill="url(#lbldg)" rx="1"/>
    <line x1="86"  y1="58" x2="108" y2="58" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>
    <line x1="86"  y1="72" x2="108" y2="72" stroke="rgba(0,0,0,0.10)" stroke-width="0.6"/>

