    <rect x="158" y="65" width="84" height="37" fill="#E6F7F2" rx="1"/>
    <line x1="158" y1="76" x2="242" y2="76" stroke="rgba(29,158,117,0.20)" stroke-width="0.7"/>
    <line x1="158" y1="87" x2="242" y2="87" stroke="rgba(29,158,117,0.20)" stroke-width="0.7"/>
    <rect x="163" y="69" width="15" height="11" fill="rgba(239,159,39,0.55)" rx="1"/>
    <rect x="222" y="69" width="15" height="11" fill="rgba(239,159,39,0.55)" rx="1"/>
    <rect x="188" y="83" width="24" height="19" fill="rgba(29,158,117,0.30)" rx="2"/>
    <circle cx="208" cy="93" r="1.8" fill="rgba(0,0,0,0.15)"/>

    <!-- GOLDEN WAVE -->
    <path d="M 68,96 C 130,74 168,70 200,82 C 232,94 270,106 332,84 L 332,100 C 270,124 232,112 200,100 C 168,88 130,96 68,118 Z" fill="url(#lgoldWave)"/>

